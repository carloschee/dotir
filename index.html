<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dótir SAAC - Optimizado</title>
    <style>
        :root {
            --bg-app: #f0f4f7;
            --radius: 18px;
            --cat-subject: #ffeb3b; --cat-action: #c5e1a5; --cat-noun: #90caf9;
            --cat-medical: #ef9a9a; --cat-social: #ffccbc; --cat-place: #d1d8e0;
        }

        /* RESET Y BLOQUEO DE SCROLL GLOBAL */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg-app);
            font-family: system-ui, -apple-system, sans-serif;
            position: fixed; 
        }

        #app-container { 
            display: flex; flex-direction: column; 
            height: 100vh; height: 100dvh; width: 100vw;
            overflow: hidden;
        }

        .view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .hidden { display: none !important; }

        /* CABECERAS FIJAS */
        .module-nav-bar { 
            height: 60px; flex-shrink: 0;
            background: white; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; 
        }
        
        #phrase-section { 
            height: 100px; flex-shrink: 0;
            background: white; margin: 10px; border-radius: var(--radius); 
            display: flex; align-items: center; padding: 0 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #category-bar { 
            height: 55px; flex-shrink: 0;
            display: flex; gap: 8px; overflow-x: auto; padding: 5px 10px; 
            scrollbar-width: none;
        }
        #category-bar::-webkit-scrollbar { display: none; }

        /* GRID CON SCROLL INDEPENDIENTE */
        #pictogram-grid { 
            flex: 1; 
            overflow-y: auto !important; 
            -webkit-overflow-scrolling: touch; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); 
            gap: 12px; 
            padding: 10px 15px 120px; 
            background: var(--bg-app);
        }

        /* TARJETAS */
        .picto-card { 
            position: relative; background: white; border-radius: var(--radius); 
            padding: 10px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            border-bottom: 4px solid rgba(0,0,0,0.1); 
            min-height: 120px; cursor: pointer; user-select: none;
        }
        .picto-card img { width: 70%; height: auto; pointer-events: none; }
        .picto-label { margin-top: 6px; font-weight: bold; font-size: 0.7rem; text-align: center; color: #333; }
        
        .fav-star { position: absolute; top: 5px; right: 5px; color: #f1c40f; display: none; font-size: 1.1rem; }
        .is-fav .fav-star { display: block; }

        /* COLORES CATEGORÍAS */
        .cat-subject { background-color: var(--cat-subject); }
        .cat-action { background-color: var(--cat-action); }
        .cat-noun { background-color: var(--cat-noun); }
        .cat-medical { background-color: var(--cat-medical); }
        .cat-social { background-color: var(--cat-social); }
        .cat-place { background-color: var(--cat-place); }

        .cat-btn { padding: 8px 15px; border-radius: 20px; border: 2px solid #ddd; background: white; font-weight: bold; cursor: pointer; white-space: nowrap; font-size: 0.75rem; }
        .cat-btn.active { background: #4a90e2; color: white; border-color: #4a90e2; }

        /* CONTROLES FRASE */
        #speak-btn { background: #55efc4; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; }
        #clear-btn { background: #ff7675; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; }
        .phrase-display { flex: 1; display: flex; gap: 5px; overflow-x: auto; align-items: center; height: 100%; }
        .phrase-display img { height: 60px; width: 60px; object-fit: contain; }

        /* MENÚ */
        .menu-item { background: white; padding: 25px; border-radius: 20px; margin: 10px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="app-container">
        
        <section id="view-menu" class="view">
            <header style="text-align:center; padding:40px 20px;">
                <h1 style="margin:0; font-size:2.5rem;">Dótir</h1>
                <p style="color:#636e72;">Comunicador SAAC Optimizado</p>
            </header>
            <div class="menu-item" onclick="navigateTo('saac')">
                <span style="font-size:2rem;">💬</span>
                <div><b style="display:block;">Comunicador</b><span>Tablero de voz</span></div>
            </div>
            <div class="menu-item" onclick="accessSettings()">
                <span style="font-size:2rem;">⚙️</span>
                <div><b style="display:block;">Ajustes</b><span>Configuración</span></div>
            </div>
        </section>

        <section id="view-saac" class="view hidden">
            <nav class="module-nav-bar">
                <button onclick="navigateTo('menu')" style="border:none; background:#eee; padding:8px 15px; border-radius:10px; font-weight:bold; cursor:pointer;">⬅ Menú</button>
                <div id="status-voice" style="font-size: 0.7rem; color: #999;">Voz lista</div>
                <div style="width:40px;"></div>
            </nav>

            <header id="phrase-section">
                <div id="current-phrase" class="phrase-display"></div>
                <button id="speak-btn" onclick="speakPhrase()" style="margin-right:5px;">🔊</button>
                <button id="clear-btn" onclick="clearPhrase()">✖</button>
            </header>

            <nav id="category-bar">
                <button class="cat-btn active" onclick="filterCategory('favs')">⭐ FAVS</button>
                <button class="cat-btn" onclick="filterCategory('social')">SOCIAL</button>
                <button class="cat-btn" onclick="filterCategory('medical')">SALUD</button>
                <button class="cat-btn" onclick="filterCategory('action')">ACCIONES</button>
                <button class="cat-btn" onclick="filterCategory('noun')">OBJETOS</button>
                <button class="cat-btn" onclick="filterCategory('place')">LUGARES</button>
                <button class="cat-btn" onclick="filterCategory('all')">TODOS</button>
            </nav>

            <main id="pictogram-grid"></main>
        </section>

    </div>

    <script>
        const rawFiles = ["abeja", "abrazo", "adiós", "ahora", "antes", "autobús", "avión", "ayuda", "bicicleta", "bien", "brazo", "caballo", "cabeza", "cansado", "caracol", "coche", "curita", "después", "dibujar", "diente", "dolor", "enfadado", "escuchar", "escuela", "espalda", "estomago", "farola", "fiebre", "flor", "frutería", "garganta", "gato", "gracias", "hola", "hospital", "jarabe", "kiosco", "lavar", "lluvia", "mal", "mano", "mareo", "mariposa", "miedo", "más", "no quiero", "no", "oler", "oído", "panadería", "papelera", "parque", "paso de cebra", "pastilla", "perro", "pez", "pie", "pierna", "poco", "por favor", "pájaro", "semáforo", "Sol", "solicitar permiso", "suave", "sí", "termómetro", "tocar", "tos", "tren", "triste", "vaca", "vacuna", "ver", "vómito", "yo quiero", "árbol"];
        
        let favorites = JSON.parse(localStorage.getItem('dotir_favs')) || [];
        let currentPhrase = [];
        let activeFilter = 'favs';
        let selectedVoice = null;

        // --- OPTIMIZACIÓN TTS ---
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            // Buscamos la mejor voz en español disponible en el sistema
            selectedVoice = voices.find(v => v.lang.includes('es') && v.name.includes('Paulina')) || 
                            voices.find(v => v.lang.includes('es') && v.name.includes('Google')) ||
                            voices.find(v => v.lang.includes('es')) ||
                            voices[0];
            if(selectedVoice) document.getElementById('status-voice').innerText = "Voz: " + selectedVoice.name;
        }

        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speak(text) {
            window.speechSynthesis.cancel(); // Detiene cualquier audio previo (reactividad)
            const msg = new SpeechSynthesisUtterance(text);
            if (selectedVoice) msg.voice = selectedVoice;
            msg.lang = 'es-ES';
            msg.rate = 0.9;  // Velocidad levemente reducida para claridad
            msg.pitch = 1.0; // Tono normal
            msg.volume = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function speakPhrase() { 
            if (currentPhrase.length > 0) {
                const fullText = currentPhrase.map(i => i.voice).join(' ');
                speak(fullText);
            } 
        }

        // --- LÓGICA DE NAVEGACIÓN Y RENDER ---
        function getCategory(name) {
            const n = name.toLowerCase();
            if (n === "yo quiero") return "subject";
            if (["dibujar", "lavar", "oler", "tocar", "ver", "escuchar", "solicitar permiso", "abrazo"].includes(n)) return "action";
            if (["cabeza", "fiebre", "dolor", "vómito", "tos", "mareo", "garganta", "brazo", "pierna", "estomago", "oído", "pie", "mano", "espalda", "diente", "curita", "pastilla", "jarabe", "vacuna", "termómetro"].includes(n)) return "medical";
            if (["bien", "mal", "gracias", "hola", "adiós", "ayuda", "por favor", "sí", "no", "no quiero", "triste", "enfadado", "cansado", "miedo", "suave"].includes(n)) return "social";
            if (["hospital", "escuela", "frutería", "kiosco", "panadería", "parque", "paso de cebra", "farola", "papelera", "semáforo"].includes(n)) return "place";
            return "noun";
        }

        const vocabulary = rawFiles.map(file => ({
            id: file, label: file.toUpperCase(), img: `assets/pics/${file}.png`, voice: file, cat: getCategory(file)
        }));

        function navigateTo(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if (view === 'saac') {
                window.speechSynthesis.cancel(); // "Despierta" el audio en iOS
                renderSAAC();
            }
        }

        function filterCategory(cat) {
            activeFilter = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${cat}'`));
            });
            renderSAAC();
        }

        function renderSAAC() {
            const grid = document.getElementById('pictogram-grid');
            grid.innerHTML = '';
            
            let filtered = (activeFilter === 'all') ? vocabulary : 
                           (activeFilter === 'favs') ? vocabulary.filter(v => favorites.includes(v.id)) :
                           vocabulary.filter(v => v.cat === activeFilter);
            
            if (activeFilter === 'favs' && filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color:#636e72;"><h3>Panel de Favoritos</h3><p>Mantén pulsado un pictograma en otras categorías para que aparezca aquí.</p></div>';
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `picto-card cat-${item.cat} ${favorites.includes(item.id) ? 'is-fav' : ''}`;
                card.innerHTML = `<div class="fav-star">⭐</div><img src="${item.img}" onerror="this.style.opacity='0.2'"><span class="picto-label">${item.label}</span>`;

                let timer;
                card.onmousedown = card.ontouchstart = (e) => {
                    timer = setTimeout(() => { toggleFavorite(item.id); timer = null; }, 800);
                };
                card.onmouseup = card.ontouchend = card.onmouseleave = () => clearTimeout(timer);
                
                card.onclick = () => {
                    if (timer === null) return;
                    currentPhrase.push(item);
                    updatePhraseDisplay();
                    speak(item.voice);
                };
                grid.appendChild(card);
            });
        }

        function toggleFavorite(id) {
            if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('dotir_favs', JSON.stringify(favorites));
            renderSAAC();
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function updatePhraseDisplay() {
            const display = document.getElementById('current-phrase');
            display.innerHTML = '';
            currentPhrase.forEach((item, index) => {
                const img = document.createElement('img');
                img.src = item.img;
                img.onclick = () => { currentPhrase.splice(index, 1); updatePhraseDisplay(); };
                display.appendChild(img);
            });
        }

        function clearPhrase() { currentPhrase = []; updatePhraseDisplay(); }

        function accessSettings() {
            const pass = prompt("Acceso restringido. Código:");
            if (pass === '1234') alert("Ajustes de sistema.");
        }
    </script>
</body>
</html>
