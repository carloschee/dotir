<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dótir SAAC - Inmersivo</title>
    <style>
        :root {
            --bg-app: #f0f4f7;
            --radius: 18px;
            --cat-subject: #ffeb3b; --cat-action: #c5e1a5; --cat-noun: #90caf9;
            --cat-medical: #ef9a9a; --cat-social: #ffccbc; --cat-place: #d1d8e0;
            --nav-bg: rgba(255, 255, 255, 0.98);
        }

        /* ESTRUCTURA BASE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg-app);
            font-family: system-ui, -apple-system, sans-serif;
            position: fixed;
        }

        #app-container { 
            display: flex; flex-direction: column; 
            height: 100dvh; width: 100vw;
            padding-top: env(safe-area-inset-top);
        }

        .view { display: flex; flex-direction: column; flex: 1; overflow: hidden; position: relative; }
        .hidden { display: none !important; }

        /* SEGURIDAD OVERLAY */
        #security-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; align-items: center;
            justify-content: center; z-index: 10000; backdrop-filter: blur(8px);
        }
        .modal-content { background: white; padding: 35px; border-radius: 30px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .modal-content input { width: 100%; padding: 15px; font-size: 1.8rem; text-align: center; border-radius: 15px; border: 2px solid #eee; margin: 20px 0; outline: none; }

        /* FRASES Y TABLERO */
        #phrase-section { height: 110px; flex-shrink: 0; background: white; margin: 15px; border-radius: var(--radius); display: flex; align-items: center; padding: 0 15px; box-shadow: 0 6px 15px rgba(0,0,0,0.06); }
        .phrase-display { flex: 1; display: flex; gap: 10px; overflow-x: auto; align-items: center; height: 100%; }
        .phrase-display img { height: 80px; width: 80px; object-fit: contain; }

        #category-bar { height: 60px; flex-shrink: 0; display: flex; gap: 10px; overflow-x: auto; padding: 5px 15px; scrollbar-width: none; }
        #category-bar::-webkit-scrollbar { display: none; }

        #pictogram-grid { 
            flex: 1; overflow-y: auto !important; -webkit-overflow-scrolling: touch; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 15px; padding: 10px 15px 120px; /* Padding extra para el nav inferior */
        }

        /* NAVEGACIÓN INFERIOR INMERSIVA */
        .bottom-nav-wrapper {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--nav-bg); 
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-bottom: env(safe-area-inset-bottom); /* Cubre el área blanca */
            z-index: 1000;
            display: flex; flex-direction: column;
        }

        .nav-main-row {
            display: flex; align-items: center; gap: 12px; padding: 12px 15px;
        }

        .safe-area-status {
            height: 4px; width: 40px; background: #2ecc71; 
            margin: 4px auto 8px; border-radius: 2px; opacity: 0.6;
        }

        #live-search { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1.5px solid #e0e6ed; font-size: 1rem; height: 48px; outline: none; background: #f8fafc; }
        .nav-circle-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: #2f3542; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        /* TARJETAS */
        .picto-card { 
            position: relative; background: white; border-radius: var(--radius); 
            padding: 12px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; border-bottom: 5px solid rgba(0,0,0,0.08); 
            min-height: 140px; user-select: none;
        }
        .is-fav::after { content: '⭐'; position: absolute; top: 10px; right: 10px; font-size: 1.2rem; color: #f1c40f; }
        .cat-subject { background-color: var(--cat-subject); }
        .cat-action { background-color: var(--cat-action); }
        .cat-noun { background-color: var(--cat-noun); }
        .cat-medical { background-color: var(--cat-medical); }
        .cat-social { background-color: var(--cat-social); }
        .cat-place { background-color: var(--cat-place); }

        /* BOTONES ACCIÓN */
        #speak-btn { background: #2ecc71; border: none; width: 55px; height: 55px; border-radius: 50%; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        #clear-btn { background: #e74c3c; border: none; width: 55px; height: 55px; border-radius: 50%; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }

        .menu-item { background: white; padding: 30px; border-radius: 28px; margin: 15px 25px; display: flex; align-items: center; gap: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.04); }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div id="security-modal" class="hidden">
            <div class="modal-content">
                <h2 style="margin:0">Acceso Restringido</h2>
                <p id="hint-date" style="color:#888; font-size:0.9rem; margin:10px 0;"></p>
                <input type="number" id="pin-input" pattern="[0-9]*" inputmode="numeric" placeholder="••••">
                <div style="display:flex; gap:15px;">
                    <button onclick="closeSecurity()" style="flex:1; padding:15px; border-radius:15px; border:none; background:#f1f2f6; font-weight:bold;">Cancelar</button>
                    <button onclick="verifySecurity()" style="flex:1; padding:15px; border-radius:15px; border:none; background:#2f3542; color:white; font-weight:bold;">Entrar</button>
                </div>
            </div>
        </div>

        <section id="view-menu" class="view">
            <header style="text-align: center; padding: 80px 20px 40px;">
                <h1 style="margin:0; font-size:4rem; letter-spacing:-2px; color: #2f3542;">Dótir</h1>
                <div style="width:40px; height:4px; background:#4a90e2; margin:15px auto; border-radius:2px;"></div>
            </header>
            <div class="menu-item" onclick="navigateTo('saac')">
                <span style="font-size:3rem;">💬</span>
                <div><b style="font-size:1.2rem;">Tablero</b><br><span style="color:#888;">Comunicación por pictogramas</span></div>
            </div>
            <div class="menu-item" onclick="openSecurity()">
                <span style="font-size:3rem;">⚙️</span>
                <div><b style="font-size:1.2rem;">Ajustes</b><br><span style="color:#888;">Gestión y mantenimiento</span></div>
            </div>
        </section>

        <section id="view-saac" class="view hidden">
            <header id="phrase-section">
                <div id="current-phrase" class="phrase-display"></div>
                <button id="speak-btn" onclick="speakPhrase()">🔊</button>
                <button id="clear-btn" onclick="clearPhrase()">✖</button>
            </header>

            <nav id="category-bar">
                <button class="cat-btn active" onclick="filterCategory('favs')">⭐ Favoritos</button>
                <button class="cat-btn" onclick="filterCategory('social')">SOCIAL</button>
                <button class="cat-btn" onclick="filterCategory('medical')">SALUD</button>
                <button class="cat-btn" onclick="filterCategory('action')">ACCIONES</button>
                <button class="cat-btn" onclick="filterCategory('noun')">OBJETOS</button>
                <button class="cat-btn" onclick="filterCategory('place')">LUGARES</button>
                <button class="cat-btn" onclick="filterCategory('all')">TODO</button>
            </nav>

            <main id="pictogram-grid"></main>

            <div class="bottom-nav-wrapper">
                <div class="nav-main-row">
                    <button class="nav-circle-btn" onclick="navigateTo('menu')">🏠</button>
                    <input type="text" id="live-search" placeholder="Buscar ficha..." oninput="handleSearch(this.value)">
                </div>
                <div class="safe-area-status" id="status-bar"></div>
            </div>
        </section>

        <section id="view-settings" class="view hidden">
            <div style="padding: 25px;">
                <button onclick="navigateTo('menu')" style="padding:12px 25px; border-radius:12px; border:none; background:#2f3542; color:white; font-weight:bold;">⬅ Menú Principal</button>
                <h2 style="margin-top:40px; font-size:2rem;">Configuración</h2>
                
                <div style="background:white; padding:25px; border-radius:25px; margin-top:20px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                    <h4 style="margin-top:0">Contenido Offline</h4>
                    <button onclick="downloadAllAssets()" style="width:100%; padding:18px; background:#4a90e2; color:white; border:none; border-radius:15px; font-weight:bold; font-size:1rem;">Descargar Pictogramas</button>
                </div>

                <div style="background:white; padding:25px; border-radius:25px; margin-top:20px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                    <h4 style="margin-top:0">Mantenimiento</h4>
                    <button onclick="refreshApp()" style="width:100%; padding:18px; background:#ff7675; color:white; border:none; border-radius:15px; font-weight:bold; font-size:1rem;">Refrescar App</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        const rawFiles = ["abeja", "abrazo", "adiós", "ahora", "antes", "autobús", "avión", "ayuda", "bicicleta", "bien", "brazo", "caballo", "cabeza", "cansado", "caracol", "coche", "curita", "después", "dibujar", "diente", "dolor", "enfadado", "escuchar", "escuela", "espalda", "estomago", "farola", "fiebre", "flor", "frutería", "garganta", "gato", "gracias", "hola", "hospital", "jarabe", "kiosco", "lavar", "lluvia", "mal", "mano", "mareo", "mariposa", "miedo", "más", "no quiero", "no", "oler", "oído", "panadería", "papelera", "parque", "paso de cebra", "pastilla", "perro", "pez", "pie", "pierna", "poco", "por favor", "pájaro", "semáforo", "Sol", "solicitar permiso", "suave", "sí", "termómetro", "tocar", "tos", "tren", "triste", "vaca", "vacuna", "ver", "vómito", "yo quiero", "árbol"];
        
        let favorites = JSON.parse(localStorage.getItem('dotir_favs')) || [];
        let currentPhrase = [];
        let activeFilter = 'favs';
        let searchQuery = "";
        let selectedVoice = null;

        // VOZ LATAM
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            selectedVoice = voices.find(v => v.lang === 'es-MX' || v.name.toLowerCase().includes('mexico')) ||
                            voices.find(v => v.lang === 'es-US' || v.name.toLowerCase().includes('latin')) ||
                            voices.find(v => v.lang.includes('es'));
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            if (selectedVoice) msg.voice = selectedVoice;
            msg.rate = 0.95; 
            window.speechSynthesis.speak(msg);
        }

        function getCategory(name) {
            const n = name.toLowerCase();
            if (n === "yo quiero") return "subject";
            if (["dibujar", "lavar", "oler", "tocar", "ver", "escuchar", "abrazo"].includes(n)) return "action";
            if (["cabeza", "fiebre", "dolor", "vómito", "tos", "mareo", "garganta", "brazo", "pierna", "estomago", "oído", "pie", "mano", "espalda", "diente", "curita", "pastilla", "jarabe", "vacuna", "termómetro"].includes(n)) return "medical";
            if (["bien", "mal", "gracias", "hola", "adiós", "ayuda", "por favor", "sí", "no", "no quiero", "triste", "enfadado", "cansado", "miedo"].includes(n)) return "social";
            if (["hospital", "escuela", "frutería", "kiosco", "panadería", "parque", "paso de cebra", "farola", "papelera", "semáforo"].includes(n)) return "place";
            return "noun";
        }

        const vocabulary = rawFiles.map(file => ({
            id: file, label: file.toUpperCase(), img: `assets/pics/${file}.png`, voice: file, cat: getCategory(file)
        }));

        // SEGURIDAD
        function openSecurity() {
            const now = new Date();
            document.getElementById('hint-date').innerText = `PIN: Suma de ${now.getDate()} + ${now.getMonth()+1} + ${now.getFullYear()}`;
            document.getElementById('security-modal').classList.remove('hidden');
        }
        function closeSecurity() { document.getElementById('security-modal').classList.add('hidden'); document.getElementById('pin-input').value = ''; }
        function verifySecurity() {
            const now = new Date();
            const pin = now.getDate() + (now.getMonth() + 1) + now.getFullYear();
            if (parseInt(document.getElementById('pin-input').value) === pin) {
                closeSecurity(); navigateTo('settings');
            } else { 
                document.getElementById('pin-input').style.borderColor = '#ff7675';
                setTimeout(() => document.getElementById('pin-input').style.borderColor = '#eee', 500);
            }
        }

        function navigateTo(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            if (v === 'saac') renderSAAC();
        }

        function handleSearch(val) { searchQuery = val.toLowerCase(); renderSAAC(); }
        function filterCategory(cat) {
            activeFilter = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(cat.toLowerCase()) || (cat==='favs' && b.innerText.includes('⭐'))));
            renderSAAC();
        }

        function renderSAAC() {
            const grid = document.getElementById('pictogram-grid');
            grid.innerHTML = '';
            let filtered = vocabulary.filter(v => {
                const matchesCat = (activeFilter === 'all') || (activeFilter === 'favs' ? favorites.includes(v.id) : v.cat === activeFilter);
                return matchesCat && v.id.toLowerCase().includes(searchQuery);
            });
            
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `picto-card cat-${item.cat} ${favorites.includes(item.id) ? 'is-fav' : ''}`;
                card.innerHTML = `<img src="${item.img}" loading="lazy"><span class="picto-label">${item.label}</span>`;
                
                let pressTimer;
                let isLongPress = false;

                const start = () => {
                    isLongPress = false;
                    pressTimer = setTimeout(() => {
                        isLongPress = true;
                        if ("vibrate" in navigator) navigator.vibrate(60);
                        card.classList.add('fav-pop');
                        setTimeout(() => card.classList.remove('fav-pop'), 400);
                        toggleFavorite(item.id);
                    }, 800);
                };

                const cancel = (e) => {
                    clearTimeout(pressTimer);
                    if (!isLongPress && e.type !== 'mouseleave') {
                        currentPhrase.push(item);
                        updatePhrase();
                        speak(item.voice);
                    }
                };

                card.onmousedown = card.ontouchstart = start;
                card.onmouseup = card.ontouchend = cancel;
                grid.appendChild(card);
            });
        }

        function toggleFavorite(id) {
            favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
            localStorage.setItem('dotir_favs', JSON.stringify(favorites));
            renderSAAC();
        }

        function updatePhrase() {
            const d = document.getElementById('current-phrase');
            d.innerHTML = '';
            currentPhrase.forEach((it, i) => {
                const im = document.createElement('img');
                im.src = it.img;
                im.onclick = () => { currentPhrase.splice(i, 1); updatePhrase(); };
                d.appendChild(im);
            });
        }

        function speakPhrase() { speak(currentPhrase.map(i => i.voice).join(' ')); }
        function clearPhrase() { currentPhrase = []; updatePhrase(); }

        async function downloadAllAssets() {
            const btn = event.target;
            btn.innerText = "Descargando...";
            try {
                const c = await caches.open('dotir-v1');
                await c.addAll(['index.html', ...vocabulary.map(v => v.img)]);
                btn.innerText = "✅ Completado";
                btn.style.background = "#2ecc71";
            } catch (e) { alert("Error de conexión"); btn.innerText = "Reintentar"; }
        }

        async function refreshApp() {
            if(confirm("¿Actualizar contenido?")) {
                const ks = await caches.keys();
                await Promise.all(ks.map(k => caches.delete(k)));
                location.reload(true); 
            }
        }
    </script>
</body>
</html>
