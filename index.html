<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DJ Emmy - Reproductor Infantil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="overflow-hidden text-white font-sans flex flex-col">

    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
        <symbol id="icn-casa" viewBox="0 0 44 44">
            <circle cx="22" cy="22" r="22" fill="white"/>
            <path d="M8 21 L22 8 L36 21" stroke="#7c3aed" stroke-width="3.5" fill="none"/>
            <rect x="13" y="21" width="18" height="14" rx="2.5" fill="#7c3aed"/>
        </symbol>
        <symbol id="icn-stop" viewBox="0 0 40 40">
            <circle cx="20" cy="20" r="20" fill="#ef4444"/>
            <rect x="12" y="12" width="16" height="16" rx="2.5" fill="white"/>
        </symbol>
    </svg>

    <div id="menu-inicio" class="flex-1 flex flex-col px-4 pt-3 pb-2 gap-3">
        <div class="flex items-center justify-between shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-xl shadow-lg">🎧</div>
                <h1 class="text-xl font-black">DJ Emmy <span class="text-[9px] opacity-60">v80</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleMuteSFX()" class="bg-white/15 w-9 h-9 rounded-xl flex items-center justify-center border border-white/15">
                    <span>🔊</span>
                    <span id="dot-mute-menu" class="absolute top-0.5 right-0.5 w-2 h-2 rounded-full bg-green-400"></span>
                </button>
                <button onclick="pararTodo()" class="w-9 h-9"><svg width="36" height="36"><use href="#icn-stop"/></svg></button>
            </div>
        </div>

        <div class="flex-1 grid grid-cols-2 grid-rows-2 gap-4 px-0">
            <button onclick="cambiarSeccion('musica')" class="menu-card flex items-center justify-center transition-transform active:scale-95">
                <img src="img/icn-musica.png" class="max-w-[200px] object-contain" alt="Música">
            </button>
            <button onclick="cambiarSeccion('memorama')" class="menu-card flex items-center justify-center transition-transform active:scale-95">
                <img src="img/icn-memorama.png" class="max-w-[200px] object-contain" alt="Memorama">
            </button>
            <button onclick="cambiarSeccion('videos')" class="menu-card flex items-center justify-center transition-transform active:scale-95">
                <img src="img/icn-videos.png" class="max-w-[200px] object-contain" alt="Videos">
            </button>
            <button onclick="cambiarSeccion('libros')" class="menu-card flex items-center justify-center transition-transform active:scale-95">
                <img src="img/icn-libros.png" class="max-w-[200px] object-contain" alt="Libros">
            </button>
        </div>

        </div>

    <header id="header-seccion" class="hidden px-3 py-2 flex items-center gap-2">
        <button onclick="volverAlMenu()" class="w-11 h-11"><svg width="44" height="44"><use href="#icn-casa"/></svg></button>
        <span id="titulo-seccion-activa" class="text-sm font-bold opacity-60 flex-1"></span>
        <button onclick="pararTodo()" class="w-10 h-10"><svg width="40" height="40"><use href="#icn-stop"/></svg></button>
    </header>

    <main id="main-secciones" class="hidden flex-1 px-3">
        <div id="seccion-musica" class="hidden"> ... </div>
        <div id="seccion-videos" class="hidden"> ... </div>
        
        <div id="vista-comunicador" class="hidden flex-col w-full h-full p-4">
            <div id="grid-comunicador" class="grid grid-cols-3 sm:grid-cols-4 gap-4 overflow-y-auto">
                </div>
        </div>
    </main>

    <script src="data.js"></script> <script src="app.js"></script>
</body>
</html>
