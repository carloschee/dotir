<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dótir SAAC</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        
        <section id="view-menu" class="view">
            <header class="menu-header">
                <h1>Dótir</h1>
                <p>¿Qué vamos a hacer hoy?</p>
            </header>
            <div class="menu-grid">
                <article class="menu-item" onclick="navigateTo('saac')">
                    <div class="menu-icon">💬</div>
                    <div class="menu-info">
                        <span class="title">Comunicador</span>
                        <span class="desc">Entrar al tablero</span>
                    </div>
                </article>
                <article class="menu-item" onclick="accessSettings()">
                    <div class="menu-icon">⚙️</div>
                    <div class="menu-info">
                        <span class="title">Configuración</span>
                        <span class="desc">Opciones y Offline</span>
                    </div>
                </article>
            </div>
        </section>

        <section id="view-saac" class="view hidden">
            <nav class="module-nav-bar">
                <button class="back-btn" onclick="navigateTo('menu')">⬅ Menú</button>
                <div id="module-title">SAAC</div>
                <div class="nav-spacer"></div>
            </nav>

            <div id="saac-content">
                <header id="phrase-section">
                    <div id="current-phrase" class="phrase-display"></div>
                    <div class="phrase-controls">
                        <button id="speak-btn" onclick="speakPhrase()">🔊</button>
                        <button id="clear-btn" onclick="clearPhrase()">✖</button>
                    </div>
                </header>

                <nav id="category-bar">
                    <button class="cat-btn active" onclick="filterCategory('favs')">⭐ FAVORITOS</button>
                    <button class="cat-btn" onclick="filterCategory('social')">SOCIAL</button>
                    <button class="cat-btn" onclick="filterCategory('medical')">SALUD</button>
                    <button class="cat-btn" onclick="filterCategory('action')">ACCIONES</button>
                    <button class="cat-btn" onclick="filterCategory('noun')">OBJETOS</button>
                    <button class="cat-btn" onclick="filterCategory('place')">LUGARES</button>
                    <button class="cat-btn" onclick="filterCategory('all')">TODOS</button>
                </nav>

                <main id="pictogram-grid"></main>
            </div>
        </section>

        <section id="view-settings" class="view hidden">
            <nav class="module-nav-bar">
                <button class="back-btn" onclick="navigateTo('menu')">⬅ Volver</button>
                <div id="module-title">Ajustes</div>
                <div class="nav-spacer"></div>
            </nav>
            <div class="settings-content">
                <div class="settings-card">
                    <h3>Almacenamiento Offline</h3>
                    <button class="settings-btn" onclick="downloadAllAssets()">⬇ Descargar imágenes</button>
                    <p id="status-msg"></p>
                </div>
                <div class="settings-card danger">
                    <button class="settings-btn danger" onclick="clearAppData()">🗑 Limpiar y Refrescar</button>
                </div>
            </div>
        </section>

    </div>
    <script src="app.js"></script>
</body>
</html>
