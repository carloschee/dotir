<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dótir SAAC - v1.5.1 Taller Bilingüe</title>
    <style>
        :root {
            --bg-app: #f0f4f7;
            --radius: 18px;
            --color-primary: #6c5ce7;
            --color-accent: #ce93d8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-app); font-family: system-ui, sans-serif; position: fixed; }

        #app-container { display: flex; flex-direction: column; height: 100dvh; width: 100vw; padding-top: env(safe-area-inset-top); }
        .view { display: flex; flex-direction: column; flex: 1; overflow: hidden; position: relative; }
        .hidden { display: none !important; }

        /* MENU PRINCIPAL */
        .menu-card { background: white; padding: 25px; border-radius: 25px; margin: 15px 25px; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.1s; }
        .menu-card:active { transform: scale(0.98); }

        /* TALLER DE SONIDOS */
        #abc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; overflow-y: auto; flex: 1; }
        .letter-card { 
            background: white; border-radius: 15px; height: 70px; display: flex; 
            align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; 
            color: var(--color-primary); border-bottom: 4px solid #ddd; cursor: pointer;
        }
        
        #sound-display-area { 
            height: 180px; margin: 15px; background: white; border-radius: 25px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 3px dashed var(--color-accent);
            text-align: center; padding: 10px;
        }
        #sound-img { height: 100px; object-fit: contain; margin-bottom: 5px; }

        .nav-circle-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: #2f3542; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="app-container">

    <section id="view-menu" class="view">
        <header style="text-align: center; padding: 60px 20px 30px;">
            <h1 style="margin:0; font-size:3rem; color: #2f3542;">Dótir</h1>
            <p style="color:#747d8c;">v1.5.1 • Selección de Modo</p>
        </header>
        
        <div class="menu-card" onclick="alert('Abriendo Comunicador (v1.4.1)...'); /* Aquí integras la navegación a tu SAAC */">
            <span style="font-size:2.5rem;">💬</span>
            <div><b style="font-size:1.2rem;">Comunicador</b><br><small>Hablar con pictogramas</small></div>
        </div>

        <div class="menu-card" style="background: var(--color-accent); color: white;" onclick="navigateTo('sounds')">
            <span style="font-size:2.5rem;">🎨</span>
            <div><b style="font-size:1.2rem;">Taller de Sonidos</b><br><small>Letras y palabras bilingües</small></div>
        </div>
    </section>

    <section id="view-sounds" class="view hidden">
        <header style="padding:15px; display:flex; align-items:center; gap:15px; background:white;">
            <button onclick="navigateTo('menu')" class="nav-circle-btn">🏠</button>
            <h2 style="margin:0; font-size:1.2rem;">Taller de Sonidos</h2>
        </header>

        <div id="sound-display-area">
            <img id="sound-img" src="" class="hidden">
            <div id="sound-label" style="font-size: 1.3rem; font-weight: bold; color: #2f3542;">Toca una letra</div>
            <div id="lang-tag" style="font-size: 0.8rem; color: var(--color-primary); font-weight: bold; margin-top: 5px;"></div>
        </div>

        <div id="abc-grid"></div>
    </section>

</div>

<script>
    // Vocabulario basado en intereses con traducciones
    const ludicoVocab = [
        { letter: 'A', es: 'ARÁNDANO', en: 'BLUEBERRY', img: 'assets/pics/arándano.png' },
        { letter: 'B', es: 'BRÓCOLI', en: 'BROCCOLI', img: 'assets/pics/brócoli.png' },
        { letter: 'B', es: 'BALLENA', en: 'WHALE', img: 'assets/pics/ballena.png' },
        { letter: 'C', es: 'CALABAZA', en: 'PUMPKIN', img: 'assets/pics/calabaza.png' },
        { letter: 'G', es: 'GLOBO', en: 'BALLOON', img: 'assets/pics/globo.png' },
        { letter: 'H', es: 'HELICÓPTERO', en: 'HELICOPTER', img: 'assets/pics/helicóptero.png' },
        { letter: 'L', es: 'LECHUGA', en: 'LETTUCE', img: 'assets/pics/lechuga.png' },
        { letter: 'M', es: 'MANZANA', en: 'APPLE', img: 'assets/pics/manzana.png' },
        { letter: 'P', es: 'PERA', en: 'PEAR', img: 'assets/pics/pera.png' },
        { letter: 'S', es: 'SUBMARINO', en: 'SUBMARINE', img: 'assets/pics/submarino.png' },
        { letter: 'U', es: 'UVA', en: 'GRAPE', img: 'assets/pics/uva.png' },
        { letter: 'Z', es: 'ZANAHORIA', en: 'CARROT', img: 'assets/pics/zanahoria.png' }
    ];

    const letters = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("");

    function initSounds() {
        const grid = document.getElementById('abc-grid');
        letters.forEach(l => {
            const btn = document.createElement('div');
            btn.className = 'letter-card';
            btn.innerText = l;
            btn.onclick = () => playLetterGame(l);
            grid.appendChild(btn);
        });
    }

    function playLetterGame(l) {
        window.speechSynthesis.cancel();
        
        // 1. Sonido inicial de la letra
        const intro = new SpeechSynthesisUtterance(l);
        intro.lang = 'es-MX';
        window.speechSynthesis.speak(intro);

        const matches = ludicoVocab.filter(v => v.letter === l);
        const displayImg = document.getElementById('sound-img');
        const displayLabel = document.getElementById('sound-label');
        const langTag = document.getElementById('lang-tag');

        if (matches.length > 0) {
            const chosen = matches[Math.floor(Math.random() * matches.length)];
            const useEnglish = Math.random() > 0.5; // 50% probabilidad de idioma
            
            const wordToSay = useEnglish ? chosen.en : chosen.es;
            const langCode = useEnglish ? 'en-US' : 'es-MX';

            setTimeout(() => {
                const utter = new SpeechSynthesisUtterance(wordToSay);
                utter.lang = langCode;
                utter.rate = 0.9; // Un poco más lento para claridad
                window.speechSynthesis.speak(utter);
                
                displayImg.src = chosen.img;
                displayImg.classList.remove('hidden');
                displayLabel.innerText = wordToSay;
                langTag.innerText = useEnglish ? "🇬🇧 ENGLISH" : "🇲🇽 ESPAÑOL";
            }, 600);
        } else {
            displayImg.classList.add('hidden');
            displayLabel.innerText = "Busca otra letra";
            langTag.innerText = "";
        }
    }

    function navigateTo(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.add('hidden'));
        document.getElementById(`view-${v}`).classList.remove('hidden');
    }

    window.onload = () => { initSounds(); };
</script>
</body>
</html>
