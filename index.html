<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dótir SAAC - Comunicador</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dótir SAAC">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="app-container">
        
        <section id="phrase-section">
            <div id="current-phrase" class="phrase-display">
                <p class="placeholder-text">Toca un pictograma para empezar...</p>
            </div>
            
            <div class="phrase-controls">
                <button id="clear-btn" aria-label="Borrar frase">✖</button>
            </div>
        </section>

        <main id="pictogram-grid">
            </main>

        <nav id="main-nav">
            <div class="nav-modules">
                <button class="nav-btn active" id="btn-saac">
                    <span class="icon">💬</span>
                    <span class="label">Comunicador</span>
                </button>
                <button class="nav-btn" id="btn-juegos" disabled title="Próximamente">
                    <span class="icon">🧩</span>
                    <span class="label">Actividades</span>
                </button>
            </div>

            <div class="nav-settings">
                <select id="lang-selector" aria-label="Cambiar idioma">
                    <option value="es" selected>Español</option>
                    <option value="en">English</option>
                </select>
            </div>
        </nav>

    </div>

    <script src="app.js"></script>
</body>
</html>
