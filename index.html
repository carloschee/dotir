<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dótir SAAC - Adaptativo</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="app-container">
        
        <section id="view-menu" class="view">
            <header class="menu-header">
                <h1>Dótir</h1>
                <p>¿Qué vamos a hacer hoy?</p>
            </header>
            
            <div class="menu-grid">
                <article class="menu-item" onclick="navigateTo('saac')">
                    <div class="menu-icon">💬</div>
                    <div class="menu-info">
                        <span class="title">Comunicador</span>
                        <span class="desc">Módulo SAAC</span>
                    </div>
                </article>

                <article class="menu-item disabled">
                    <div class="menu-icon">🧩</div>
                    <div class="menu-info">
                        <span class="title">Actividades</span>
                        <span class="desc">Próximamente</span>
                    </div>
                </article>
            </div>
        </section>

        <section id="view-module" class="view hidden">
            <nav class="module-nav-bar">
                <button class="back-btn" onclick="navigateTo('menu')">⬅ Menú</button>
                <div id="module-title">Comunicador</div>
                <div class="nav-spacer"></div>
            </nav>

            <div id="saac-content">
                <header id="phrase-section">
                    <div id="current-phrase" class="phrase-display"></div>
                    <div class="phrase-controls">
                        <button id="speak-btn" onclick="speakPhrase()" aria-label="Escuchar">🔊</button>
                        <button id="clear-btn" aria-label="Borrar">✖</button>
                    </div>
                </header>

                <main id="pictogram-grid">
                    </main>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
